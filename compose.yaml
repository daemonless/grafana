name: grafana

x-daemonless:
  title: "Grafana"
  icon: ":simple-grafana:"  # https://pictogrammers.com/library/mdi/ (material-) or https://simpleicons.org/ (simple-)
  category: "Network"
  description: "Grafana is an open source and composable observability and data visualization platform. Visualize metrics, logs, and traces from multiple sources like Prometheus, Loki, Elasticsearch, InfluxDB, Postgres and many more."
  upstream_url: "https://github.com/grafana/grafana"
  web_url: "https://grafana.com/grafana/"
  freshports_url: "https://www.freshports.org/www/grafana/"
  user: "bsd"
  mlock: false
  community: "Discord:https://discord.gg/Kb9tkhecZT"
  appjail: true

  docs:
    env:
      PUID: "User ID for the application process"
      PGID: "Group ID for the application process"
      TZ: "Timezone for the container"
    volumes:
      /config: "Configuration, data, logs, plugins and provisioning"
    ports:
      3000: "Web UI"

services:
  grafana:
    image: ghcr.io/daemonless/grafana:pkg
    container_name: grafana
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC

    volumes:
      - /path/to/containers/grafana:/config

    ports:
      - 3000:3000
